name: Deploy plantgram-api with CCM

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-plantgram-api
  cancel-in-progress: true

jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -euo pipefail
          jq -e 'type == "object"' deploy/env.json >/dev/null
          PLANTGRAM_IMAGE=ghcr.io/example/plantgram-api:validation \
          PLANTGRAM_JWT_SECRET=validation-only \
            docker compose -f deploy/docker-compose.yml config >/tmp/plantgram-api-compose.yml

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set image reference
        id: image
        shell: bash
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}/plantgram-api:${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7.3.0
        with:
          context: api
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.image }}

  deploy:
    needs: [compose, build]
    runs-on: [self-hosted, linux]
    environment: prod
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Deploy
        uses: ./.github/actions/ccm-deploy
        with:
          ccm_url: ${{ vars.CCM_URL }}
          ccm_stack: plantgram
          repo: ${{ github.repository }}
          sha: ${{ github.sha }}
          compose_path: deploy/docker-compose.yml
          env_json_path: deploy/env.json
          all_secrets_json: "{}"
          stack_env_json: |
            {
              "PLANTGRAM_IMAGE": ${{ toJSON(needs.build.outputs.image) }},
              "PLANTGRAM_JWT_SECRET": ${{ toJSON(secrets.PLANTGRAM_JWT_SECRET) }}
            }
          restart_after_deploy: "true"
